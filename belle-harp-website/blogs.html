        <p><em>The Okta-for-Agents Layer</em></p>

        <p><strong>Thesis:</strong> The core failure mode of agents is over-scoped capability. The winning control plane wraps every tool call in identity-aware authN/authZ, issues ephemeral least-privilege credentials, blocks unsafe actions pre-execution, and produces audit-grade logs. This becomes the default permissioning substrate for any agentic workload.</p>

        <p>Non-human identities are growing 5 to 10× faster than human identities in enterprise environments. Each agent inherits service accounts, API keys, and OAuth tokens designed for server-to-server communication, not for autonomous decision-makers that chain multiple tool calls in sequence. The blast radius of a compromised or misconfigured agent identity is orders of magnitude larger than a compromised user account.</p>

        <p>The winning architecture issues scoped, short-lived credentials per tool invocation, not per session. It integrates with existing IdPs (Okta, Azure AD, Google Workspace) while adding an agent-native authorization layer that understands tool semantics, action types, and data sensitivity. This is not a feature of existing CIEM or PAM products; it requires purpose-built infrastructure.</p>

        <p><strong>Who's building here:</strong> Keycard ($38M, Series A) and Orchid Security ($36M, Seed) are the most capitalized and represent later-stage validation signals. Multifactor ($15M, Seed) and Cyata ($8.5M, Seed) are building clean NHI governance layers. At the earliest stage, Riptides ($3.3M, Pre-seed) and Alter (YC S25) are the purest agent IAM plays.</p>

        <p><strong>Highest-conviction trio:</strong> Alter + Riptides + Cyata offer the cleanest pure-play agent IAM narrative at valuations where meaningful ownership is still achievable.</p>

        <h4>Layer 2: MCP + Tool Ecosystem Security</h4>
        <p><em>The Package Manager and Gateway for Agent Tools</em></p>

        <p><strong>Thesis:</strong> The Model Context Protocol (MCP) turns tools into the new API surface. The choke point is not the LLM; it's the tool catalog, permissions, and routing. Winners provide vetted catalogs, fine-grained permissions integrated with IdP, tool risk scoring, and full observability across agent actions.</p>

        <p>MCP is emerging as the de facto standard for how agents discover and invoke tools. This creates a new supply-chain risk surface analogous to npm or PyPI: unvetted tool packages, dependency confusion, permission escalation through tool chaining, and data exfiltration via malicious tool responses. The security model must sit at the gateway layer between the agent runtime and the tool ecosystem.</p>

        <p>The winning position here is a control plane that wraps every MCP tool invocation with identity-aware permissions, maintains a risk-scored catalog of approved tools, and provides full audit trails of tool interactions. This is infrastructure, not a feature. It must be low-latency, high-throughput, and transparent to the agent framework.</p>

        <p><strong>Who's building here:</strong> Runlayer ($11M, Seed) is the flagship MCP security control plane and the clear early leader. Golf (YC X25) and Alter (YC S25) are emerging YC-backed entrants.</p>

        <p>This is the least crowded and arguably the most strategically important layer. MCP adoption is accelerating rapidly, and the security layer is being defined right now. The investment window is narrow and timing-sensitive.</p>

        <p><em>The Enforcement Layer Inside the Agent Loop</em></p>

        <p>The critical distinction here is between monitoring (observing what agents do after the fact) and enforcement (preventing unsafe actions before they execute). The market is rapidly shifting from the former to the latter as enterprises discover that post-hoc detection cannot prevent an agent from executing a destructive database query or sending an unauthorized payment.</p>

        <p>Runtime enforcement requires sitting directly in the agent execution loop with sub-millisecond latency. The policy engine must understand the semantic context of each action: not just the API call, but the data being accessed, the user on whose behalf the agent acts, and the downstream consequences. This is technically demanding and creates meaningful barriers to entry.</p>

        <p><strong>Who's building here:</strong> This is the most crowded layer, which signals both market validation and the need for sharp differentiation. Rein Security ($8M, Seed) takes an "inside-out" runtime AppSec approach with production-context protection. Alinia ($7.5M, Seed) and AiStrike ($7M, Seed) are building dedicated agent enforcement platforms. Airrived ($6.1M, Seed) focuses on runtime governance. Overmind (€2.3M, Seed) stands out from Europe with an enforcement-first architecture, and Evoke Security ($4M, Pre-seed) is an early-stage contender.</p>

        <p><em>Trust-the-Hardware Guarantees</em></p>

        <p><strong>Thesis:</strong> As agents touch regulated and proprietary data, "we don't log" stops working. The market shifts to verifiable guarantees: attestation, TEEs, confidential GPUs. This unlocks deeper enterprise adoption and becomes a foundational layer others build on.</p>

        <p>Enterprise adoption of agentic AI in regulated industries is bottlenecked by a single question: how do we prove that sensitive data is handled correctly when processed by autonomous systems? Contractual guarantees and SOC 2 reports are insufficient when agents dynamically access and transform data across multiple systems.</p>

        <p>The solution is hardware-rooted trust: Trusted Execution Environments (TEEs), confidential GPU inference, remote attestation, and cryptographic proofs of data handling. These technologies have matured significantly, driven by investments from Intel (TDX), AMD (SEV-SNP), and NVIDIA (confidential computing). Once confidential inference is available as infrastructure, it unlocks every other layer. Agent IAM becomes provably enforced, runtime policies execute in attested environments, and observability data is cryptographically sealed. This is the trust root of the entire agent security stack.</p>

        <p><strong>Who's building here:</strong> enclaive (€4.1M, Seed) is the most mature player with real TEE orchestration capability. Tinfoil (YC X25) is YC-backed and focused on confidential AI inference. Optimal AI ($2.25M, Pre-seed) and Chutes (Seed/Early) round out the field.</p>

        <p>This is the smallest but potentially most defensible category. Technical barriers (hardware integration, cryptographic protocol design, performance optimization) are high, and the regulatory tailwinds are strong.</p>

        <h4>Layer 5: Context, Observability + Remediation Loops</h4>
        <p><em>Prove, Fix, Retest</em></p>

        <p><strong>Thesis:</strong> In agentic systems, security becomes evidence + closed-loop remediation: action logs, deterministic replay ("flight recorder"), governed memory/context, and automated fix then retest workflows. This is how you turn "agents in prod" into something CISOs can actually approve.</p>

        <p>Observability requirements for agentic systems are qualitatively different from traditional application monitoring. Agents make chains of decisions that must be understood as coherent sequences. The flight-recorder model, capturing every tool invocation, LLM response, context window state, and environmental variable, is the foundation of enterprise-grade agent governance. Layered on top, automated remediation loops (detect, fix, retest, verify) convert security from a blocking function into an enabling function that accelerates deployment.</p>

        <p><strong>Who's building here:</strong> Symbiotic Security ($10M, Seed) has the strongest traction and broadest remediation capability. Potpie AI ($2.2M, Pre-seed) focuses on AI code understanding and context mapping. Reload ($2.3M, Pre-seed) is building automated fix-retest loops. Swept AI ($1.4M, Pre-seed) and Vigilant AI (£585k, Pre-seed) are the earliest-stage entrants.</p>

        <p>The find-fix-verify loop combining Veria Labs (offensive discovery) with Symbiotic or Reload (automated remediation) represents a compelling portfolio thesis.</p>

        <h3>Portfolio Construction: Where to Focus</h3>

        <p>Based on the analysis across all five layers, a concentrated portfolio targeting 4 to 6 companies provides coverage across the most defensible positions.</p>

        <h4>Tier 1: Highest Conviction</h4>

        <p><strong>Runlayer</strong> (MCP / Tool Security). The only dedicated MCP security control plane. Defining the category in the least crowded, most structurally important layer. $11M Seed.</p>

        <p><strong>Overmind</strong> (Runtime Enforcement). Enforcement-first architecture from Europe provides regulatory advantage. Lean team with focused execution. €2.3M Seed.</p>

        <p><strong>Rein Security</strong> (Runtime Enforcement). Inside-out AppSec approach with production-context protection. Strong technical differentiation from monitoring-only players. $8M Seed.</p>

        <p><strong>enclaive</strong> (Confidential Inference). Most mature TEE orchestration platform. Highest technical moat. Foundational layer that enables all other security layers. €4.1M Seed.</p>

        <h4>Tier 2: Strong Conviction, Earlier Stage</h4>

        id: 12,
        title: "Brainrot as Taste",
        excerpt: "Brainrot is not the absence of taste. It is taste operating at a frequency most people cannot hear. From 67 to Italian brainrot to Orangutini Ananassini, why meme culture is the hardest and most honest test of whether AI can understand human preferences.",
        content: `<h2>You just don't get it</h2>
        <p>My family friend, a perfectly intelligent adult, asked me and my Gen Z friends two questions over dinner last month. First: what is 67? Second: what is Tung Tung Tung Sahur?</p>

        <p>My friend tried to explain. She really did. She pulled up a TikTok. She attempted to describe the hand gesture. She started saying something about a rapper from Philadelphia and a basketball player who is 6 foot 7 and a kid named Maverick who screamed at a basketball game and then she just stopped and said: "You just don't get it."</p>

        <p>That moment, that exact breakdown in communication, is the entire problem with benchmarking taste. Not because my family friend is dumb. She's not. But because the thing she was asking about is specifically designed to resist explanation. The content is the credential. The confusion is the point. And if you have to explain it, you've already proven you're outside the group that understands it.</p>

        <p>(For the record, my favorite brainrot is Orangutini Ananassini: an AI generated orangutan whose body is a pineapple. He was one of many orangutan fruit combos in the same video but somehow became the breakout legend, the one people actually remember, with over 1.5 million likes and a signature chant that goes "Pu, po, patapim, Anananuchi monkey monkey monkeyuchi!" I cannot explain why this is funny. I cannot explain why it works. I just know that when I hear "Anananuchi monkey monkey monkeyuchi" something in my brain lights up and I want to send it to everyone I know. That feeling is taste. And no benchmark on earth currently knows how to measure it.)</p>

        <h2>Brainrot is taste. That's the whole point.</h2>
        <p>There is a tendency to treat brainrot as the absence of taste: low quality, repetitive, algorithmically amplified slop that rots your brain. Oxford named "brain rot" its 2024 Word of the Year with exactly that framing. Respectfully, that framing is wrong.</p>

        <p>Brainrot is not tasteless content that people consume passively. It is content with extremely specific aesthetic properties that a narrow demographic finds irresistible and everyone else finds incomprehensible. The selection criteria are just invisible to outsiders. That's not the absence of taste. That's taste operating at a frequency most people cannot hear.</p>

        <p>Take 67. Dictionary.com named it the 2025 Word of the Year. It has no definition. It originated from a Philadelphia rapper named Skrilla whose track "Doot Doot (6 7)" leaked in late 2024, got attached to LaMelo Ball highlight edits on TikTok because he happens to be 6 foot 7, then mutated into a gesture, a chant, a classroom disruption, a thing banned by headteachers (the British Prime Minister had to apologize after doing the hand gesture at a school that had banned it), and eventually became culturally load bearing enough that In N Out retired the number from their ticket system because teenagers kept swarming restaurants to cheer when it was called.</p>

        <p>Ask a Gen Alpha kid what 67 means and they will tell you it means nothing. Ask them why they scream it and they will tell you it just feels right. Dictionary.com's own definition calls it "a burst of energy that spreads and creates connection, even though no one agrees on what it actually means." That is a description of taste, not the absence of it.</p>

        <h2>Italian brainrot and the question of where taste lives</h2>
        <p>Now here's where it gets interesting for anyone who cares about AI.</p>

        <p>Italian brainrot exploded in January 2025. TikTok creators started generating surreal AI images of hybrid creatures: a three legged shark in Nike sneakers called Tralalero Tralala, a crocodile fused with a bomber plane called Bombardiro Crocodilo, a ballerina with a cappuccino mug for a head called Ballerina Cappuccina. They gave them pseudo Italian names with rhyming suffixes and paired the visuals with ElevenLabs' "Adam" text to speech voice doing ominous, nonsensical narration. By February, an Indonesian creator under 20 named Noxa posted Tung Tung Tung Sahur, an anthropomorphic wooden drum holding a baseball bat, named after the sound Indonesians traditionally make beating slit drums to wake people for the pre dawn Ramadan meal. Over 81 million views on TikTok.</p>

        <p>None of this should work. The aesthetics are deliberately sloppy. The names are nonsensical. The "lore" is incoherent. The characters are ugly on purpose. Polish radio described the appeal as "stupid, funny, and veeeery addictive."</p>

        <p>Here's the thing people miss: the images are AI generated. The creatures are made with Bing Image Creator, Midjourney, and similar tools. The voiceovers come from ElevenLabs text to speech. The raw materials are entirely synthetic.</p>

        <p>But the taste is entirely human.</p>

        <p>The model did not decide to combine a shark with Nike sneakers. The model did not decide the name should rhyme in fake Italian. The model did not decide the voiceover should sound ominous rather than cheerful, or that the visual quality should be just rough enough to feel hand assembled rather than polished. A person made all of those decisions. The AI was the rendering engine. The taste was in the prompting, the selection, the curation, and the cultural timing. (See my article on dadaism!)</p>

        <h2>Prompting is the new taste layer (and it's already being industrialized)</h2>
        <p>This insight, that taste lives in the prompt rather than the output, is not limited to Italian brainrot. It's becoming the operating logic of an entire content ecosystem.</p>

        <p>Scroll through Instagram Reels or TikTok right now and you will see the same format everywhere: AI generated animated objects speaking directly to camera. A philosophical avocado explaining its own nutritional value. A motivational banana delivering life advice. A scolding coffee mug complaining about Mondays. One creator documented making 50 of these viral AI talking object videos in a single week and published the exact prompt system they used. The core insight: every successful video came from the same three part prompt structure, and the creators winning are not better designers or editors. They are better prompt engineers.</p>

        <p>The format works because of simple psychology. When an inanimate object speaks in first person, the brain registers it as unexpected. Unexpected content triggers a pause reflex. A paused viewer becomes a watching viewer. But the difference between a talking avocado that gets 200 views and one that gets 2 million views is not the avocado. It's the specificity of the prompt: the tone, the pacing, the Pixar adjacent visual style, the exact emotional register that makes someone stop scrolling.</p>

        <p>Today's reels and TikToks that go viral follow trends, but with the rise of AI, these trends are easily replicated through framing and prompting. The content creation barrier has collapsed. Anyone can generate a talking object video in minutes. The bottleneck is no longer production. The bottleneck is taste: knowing which object, which voice, which joke, which cultural moment will make someone stop and watch.</p>

        <h2>Herd mentality and the measurement problem</h2>
        <p>Here is where this gets difficult for anyone trying to build a benchmark.</p>

        <p>Memes and herd mentality are deeply intertwined. Memes act as digital catalysts that activate the psychological phenomenon where individuals conform to the behavior, beliefs, and emotions of a larger group. They spread rapidly through social networks, leveraging the human instinct to follow the crowd. When 67 goes viral, it is impossible to cleanly separate "this person genuinely finds this compelling" from "this person is performing membership in a group that finds this compelling." The two are entangled. The taste is partly individual and partly social. A kid might scream 67 because they think it is funny and because screaming 67 is how you demonstrate you belong to the generation that screams 67.</p>

        <p>Crowdsourced benchmarks like LMArena (which raised a $100M seed round at a $600M valuation) surface this problem in a milder form. When people vote on which chatbot response they prefer, some fraction of their preference is about the actual quality of the response and some fraction is about what kind of response they think they should prefer. Design Arena, built by Arcada Labs (YC S25), encounters the same dynamic but in a domain where subjectivity is even more dominant: design, audio, image, and video generation. Over 2 million users across 190+ countries have voted on pairwise model comparisons. Their thesis is that the most accurate benchmark for a model's ability to create what people actually want is measured at the user behavior level, not with some set of verifiable evals.</p>

        <p>Brainrot stress tests that thesis because it reveals how much of "what people actually want" is contextual, social, and generational. Three people looking at the same rack of Italian Brainrot dolls in a Tokyo shop will have three completely different taste responses, all technically valid, all pointing to different "correct" benchmark answers depending on who you ask.</p>

        <h2>Can autonomous AI ever be as funny as the average human?</h2>
        <p>Probably not. And brainrot is the clearest proof of why.</p>

        <p>Humor is contextual, transgressive, and timing dependent. It requires knowing what the audience expects and then violating that expectation in a way that feels pleasurable rather than hostile. Brainrot humor specifically requires knowing what is currently considered "too much" by the mainstream and then pushing exactly past that line in a direction that feels novel rather than derivative, with aesthetics that signal insider status rather than outsider imitation.</p>

        <p>AI models are trained on distributions. They learn what is average, what is common, what tends to co occur. They can generate content that looks like humor because they can reproduce the surface patterns of things that have been labeled funny. But the mechanism of brainrot humor, the thing that generates 81 million views from a wooden drum holding a bat, or that turns two meaningless numbers into Dictionary.com's Word of the Year, is precisely about departing from the distribution in a way the distribution itself cannot predict.</p>

        <p>Consider my beloved Orangutini Ananassini. He was one of several orangutan fruit hybrids in the same video. Same creator. Same AI tool. Same prompt structure. But somehow the pineapple one was the one that broke out. That "somehow" is taste. It's the gap between generation (which AI can do) and selection (which, for now, remains stubbornly human). The model can produce ten orangutan fruit combos. It cannot tell you which one will make a million people send it to their friends.</p>

        <h2>So what does this mean for benchmarking?</h2>
        <p>It means brainrot might be the hardest and most honest test of whether AI systems can understand human preferences. Harder than design. Harder than music. Harder than code quality. Because brainrot is taste at its most illegible, its most social, its most resistant to explanation.</p>

        <p>Static benchmarks will not capture it. The content changes too fast, the in group signals shift weekly, and the whole point is that it's supposed to be incomprehensible to the evaluator unless they're already inside the culture. Synthetic RL environments will not capture it either, because you cannot simulate the social dynamics that make something go viral versus something that dies on arrival.</p>

        <p>The only way to measure it is the way Arcada Labs describes: at the user behavior level, with real people making real choices in real time, where the stakes are authentic because the person is actually trying to be entertained rather than trying to evaluate a model.</p>

        excerpt: "Tracing a line from Bentham's prison blueprint through Orwell's totalitarian nightmare into the present landscape of AI governance — what does it mean to live in a world where you are permanently legible to systems you cannot see, question, or opt out of?",
        content: `<p>I never expected a prison architect from the 1780s to explain why my phone knows me better than I do. But the first time I watched my phone suggest a restaurant I had only mentioned out loud once, in passing, to a friend, something clicked. Nobody was "listening" the way we imagine eavesdropping. But something was interpreting without understanding and acting on what it inferred. That moment crystallized a question I have been sitting with: what does it mean to live in a world where you are permanently legible to systems you cannot see, question, or opt out of?</p>

        <p>What follows traces a line from Bentham's prison blueprint through Orwell's totalitarian nightmare into the present landscape of AI governance. They are not the same thing. But they share a structural logic about visibility, discipline, and the production of identity through observation.</p>

        <h2>Bentham's Blueprint: Power Without the Sword</h2>
        <p>Bentham designed the Panopticon as a ring of cells around a central watchtower. Each cell is visible from the tower. The tower is not visible from the cells. Inmates can never confirm whether they are watched, so they must behave as though they always are. You do not need a guard for every prisoner. You need the possibility of observation. The architecture does the disciplinary work.</p>

        <p>Foucault understood Bentham had designed a template for power itself. In "Panopticism," he traces how this logic migrated into schools, hospitals, factories, and barracks. Make people visible. Let them internalize the gaze. Power becomes cheap, automatic, and self sustaining.</p>

        <p>AI replicates this with astonishing fidelity at a scale Bentham never imagined. Sensors replace the watchtower. Machine learning replaces the guard's judgment. Automated flags, risk scores, and content moderation replace disciplinary action. The subject, whether a job applicant, welfare recipient, or social media user, internalizes the same lesson: behave as though you are being evaluated, because you probably are.</p>

        <h2>Two Modes of Control</h2>
        <p>Foucault distinguishes the plague stricken town, where authorities impose total spatial control as emergency discipline, from the Panopticon, where discipline is permanent, subtle, and internalized. AI sits between both. Much surveillance rhetoric invokes crisis: national security, public safety, fraud prevention. The PATRIOT Act exemplifies this. But AI surveillance infrastructure has also become thoroughly normal, woven into phones, cars, loyalty cards, and fitness trackers. None feel like surveillance. They feel like convenience. But they perform the same function: rendering subjects visible and governable.</p>

        <p>The shift from crisis discipline to ambient discipline is one of the most important transitions in the history of power.</p>

        <h2>Orwell's Addition: Defining Reality</h2>
        <p>If Bentham gives us the architecture of surveillance, Orwell gives us its psychology. In 1984, watching is only part of what the Party does. It also rewrites history, engineers language through Newspeak, and colonizes inner life. If you cannot name freedom, you cannot conceive of it. If your memories are unreliable, you cannot trust yourself.</p>

        <p>This maps onto AI more precisely than most people admit. Search engines shape what counts as knowledge. Recommendation algorithms shape what counts as relevant. Content moderation defines acceptable speech. Generative AI mediates how people write and think. These systems do not just observe. They participate in constructing meaning at unprecedented scale.</p>

        <p>When a risk assessment labels someone "high risk," it produces a category that shapes how institutions treat them, which shapes outcomes, which retroactively appears to confirm the label. When a hiring algorithm filters resumes, it constructs what a "good candidate" looks like, reflecting every bias in the training data. Orwell understood that the deepest control is defining reality. AI systems are increasingly in that business.</p>

        <h2>Personal Data and the Informational Person</h2>
        <p>The idea that a person can be represented by data is not a natural fact. It is a historical achievement, produced by institutions demanding measurement, technologies enabling it, and ideologies justifying it.</p>

        <p>Over time, your data double begins to exert real force. Your credit score determines whether you rent an apartment. Your social media profile shapes job prospects. Your search history influences ads, which influence purchases, which influence your profile. The loop closes. Data capitalism produces the informational person. The informational person reshapes how we experience being a person. You cannot fully participate in modern society without a data shadow.</p>

        <p>The sociotechnical imaginary is seductive: if we can measure human reality, we can optimize it. But "fairly" and "efficiently" are doing enormous work in that sentence. These are political questions masquerading as technical ones.</p>

        <h2>Differential Exposure</h2>
        <p>The same surveillance infrastructure does not affect everyone equally. Some people live under possible observation. Others live under continuous suspicion.</p>

        <p>The VI SPDAT converts structural vulnerability into individual risk scores, collapsing complex histories into a single number that determines access to scarce housing resources. COMPAS produces racially disparate outcomes not because it uses race as input, but because race correlates with variables shaped by decades of discriminatory policing and redlining. The Allegheny Family Screening Tool over represents families using public benefits, mistaking poverty for negligence.</p>

        <p>These are not edge cases. They are predictable consequences of building decisions on data reflecting historical inequality. The Panopticon is not an equal opportunity watcher. The gaze falls heaviest on those already vulnerable.</p>

        <h2>Privacy Beyond Secrecy</h2>
        <p>Most people think of privacy as keeping information hidden. AI breaks this model through inference (deriving sensitive facts from nonsensitive inputs), aggregation (combining harmless data points into revealing profiles), and context collapse.</p>

        <p>Helen Nissenbaum's contextual integrity offers a better frame. Privacy is not secrecy but appropriate information flow within a given context. Sharing health information with your doctor is appropriate. When that information reaches your employer's insurer, the context has shifted. AI systems are engines of context collapse, repurposing data across worlds where different norms should apply.</p>

        <p>"I have nothing to hide" misses the point entirely. The question is whether the flow of information respects the contexts in which it was shared.</p>

        <h2>Why AI Ethics Keeps Failing</h2>
        <p>Munn argues most AI ethical frameworks are meaningless, isolated, and toothless. Meaningless because "fairness" and "transparency" lack operational definitions. Isolated because ethical review sits apart from product development. Toothless because there is no enforcement. The satire "A Mulching Proposal" applies Fairness, Accountability, and Transparency with perfect rigor to a system that turns elderly people into nutrient slurry. If the framework cannot distinguish between fair and unfair mulching, something is deeply wrong.</p>

        <p>Winner's critique cuts deeper: "values" has become a bureaucratic placeholder allowing institutions to appear thoughtful without engaging hard questions. AI ethics treats structural power as a technical glitch. Bias becomes a training data problem. Accountability becomes an audit trail. But many harms are features, not bugs, of systems designed to extract value and distribute risk unevenly.</p>

        <h2>The Labor Behind the Machine</h2>
        <p>Behind every "autonomous" AI system is enormous human labor. Crawford calls this "human fueled automation." Training data was labeled by someone. Content moderation was performed by someone, often under terrible conditions. The Time investigation into OpenAI's Kenyan workers revealed people earning under two dollars per hour reviewing the most disturbing content imaginable so the model could learn to avoid generating it. The labor was traumatizing and essential, yet invisible to end users.</p>

        <p>Crawford and Joler extend this to material extraction. The rare earth minerals in a smart speaker were mined under devastating conditions. The energy to train models contributes to climate change. Convenience is the visible tip of a vast planetary infrastructure of extraction.</p>

        <h2>Moral Crumple Zones</h2>
        <p>Elish describes what happens when AI systems fail: blame collapses onto the human closest to the failure. The pilot who did not override fast enough. The caseworker who did not question the screening tool. "Human in the loop" becomes a liability shield. If the human is overworked, undertrained, and given no meaningful power to override the system, then human oversight is theater.</p>

        <p>Real accountability requires aligning responsibility with power. If the institution deploys, the institution should bear responsibility when things go wrong.</p>

        <h2>What Would It Mean to Take This Seriously?</h2>
        <p><strong>What kind of person does this system produce?</strong> Every classification system constructs a version of the people it processes. A risk score produces a "high risk" person. A content moderation system produces an "acceptable" user. These are constructions that shape reality.</p>

        <p><strong>What kind of society does it normalize?</strong> Ambient surveillance makes individuals permanently legible while institutions remain opaque. This inverts democratic accountability.</p>

        <p><strong>Who becomes permanently visible?</strong> Predictive policing targets different neighborhoods than personalized streaming recommendations. Differential exposure is a feature of systems designed by those least likely to be subjected to them.</p>

        <p><strong>Who controls the tower?</strong> The answer is diffuse: tech companies, government agencies, data brokers, employers, platforms. Each with limited accountability. Each contributing to infrastructure nobody fully controls but everybody is subject to.</p>

        <h2>Conclusion</h2>
        <p>The through line from Bentham to Orwell to AI is not technological determinism. Technology did not do this to us. We did, through decisions about economies, governance, and risk. Technology accelerated those decisions.</p>

        <p>But scale matters. Bentham's guard watched hundreds. An AI evaluates millions simultaneously. Orwell's Party physically rewrote newspapers. A moderation system reshapes information in real time.</p>

        <p>The question is not whether to use AI. It is whether we can build institutions adequate to the power these systems wield. That is not a technical problem. It is a political one. We need to stop treating ethics as a feature to ship and start treating it as a practice to live, beginning with the recognition that when we build systems to watch, classify, and govern people, we are not just processing data. We are making people. And we owe them better.</p>`,

        // Remove active class from all buttons

    function filterBlogPosts(filter) {
      const cards = document.querySelectorAll('.blog-card');
      
      cards.forEach(card => {
        const tags = card.getAttribute('data-tags')?.split(',') || [];
        
        if (filter === 'all' || tags.includes(filter)) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    // Function to render blog posts
    function renderBlogPosts(posts) {
      if (posts.length === 0) {
        blogGrid.innerHTML = '<div class="loading">No blog posts yet. Check back soon!</div>';
        return;
      }

      blogGrid.innerHTML = posts.map(post => {
        const date = new Date(post.date);
        const formattedDate = date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });

        return `
          <div class="blog-card" data-tags="${post.tags.join(',')}" data-date="${post.date}" data-reading-time="${post.readingTime}" data-id="${post.id}">
            <div class="blog-content">
              <div class="blog-meta">
                <span class="blog-date">📅 ${formattedDate}</span>
                <span class="reading-time">⏱️ ${post.readingTime} min read</span>
              </div>
              <h3 class="blog-title">${post.title}</h3>
              <p class="blog-excerpt">${post.excerpt}</p>
              <div class="blog-tags">
                ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Add click handlers to cards
      document.querySelectorAll('.blog-card').forEach(card => {
        card.addEventListener('click', () => {
          const postId = card.getAttribute('data-id');
          showBlogPost(postId);
        });
      });
    }

    // Function to show individual blog post
    function showBlogPost(postId) {
      const post = blogPosts.find(p => p.id == postId);
      if (!post) return;

      const date = new Date(post.date);
      const formattedDate = date.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });

      document.getElementById('postTitle').textContent = post.title;
      document.getElementById('postMeta').innerHTML = `
        <span class="blog-date">📅 ${formattedDate}</span>
        <span class="reading-time">⏱️ ${post.readingTime} min read</span>
      `;
      document.getElementById('postTags').innerHTML = 
        post.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
      
      // Render content (can be Markdown or HTML)
      document.getElementById('postContent').innerHTML = post.content || post.excerpt;

      // Show detail view, hide grid
      document.getElementById('blogPostDetail').classList.add('active');

      document.querySelector('.filter-section').style.display = 'none';

      document.querySelector('.header').style.display = 'block';
