<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belle Nichatorn - Personal Website </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #ffffff;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            font-weight: 700;
            color: #bfa14a;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            font-size: 1.3rem;
            color: #666;
            font-style: italic;
            letter-spacing: 0.05em;
        }

        /* Main Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            margin-top: 8rem;
        }

        /* Navigation */
        .nav {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .nav-link {
            padding: 0.9rem 2.2rem;
            background: linear-gradient(90deg, #f7ecd7 0%, #f3e1b6 100%);
            border: none;
            border-radius: 30px;
            text-decoration: none;
            color: #bfa14a;
            font-weight: 600;
            font-size: 1.08rem;
            box-shadow: 0 2px 10px rgba(139, 105, 20, 0.08);
            transition: all 0.3s cubic-bezier(.4,2,.6,1);
            letter-spacing: 0.04em;
            outline: none;
        }

        .nav-link:hover {
            background: linear-gradient(90deg, #bfa14a 0%, #f7ecd7 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 24px rgba(139, 105, 20, 0.18);
        }

        /* Harp Container */
        .harp-container {
            position: relative;
            width: 500px;
            height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        /* Harp Image */
        .harp-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
            z-index: 4;
            pointer-events: none;
        }

        /* Note Display */
        .note-display {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, 1.5rem);
            font-size: 3rem;
            font-size: 1.1rem;
            color: #bfa14a;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: rgba(255, 255, 255, 0.85);
            padding: 0.25rem 0.9rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f3e1b6;
            pointer-events: none;
            z-index: 20;
        }

        .note-display.active {
            opacity: 1;
        }

        /* String Overlay SVG */
        .strings-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            
            pointer-events: none;
            z-index: 3;
        }

        /* String Styles */
        .harp-string {
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.15s ease;
            pointer-events: all;
            opacity: 0.8;
        }

        .harp-string:hover {
            stroke-width: 2.5;
            opacity: 1;
            filter: brightness(1.3);
        }

        .harp-string.active {
            stroke-width: 3;
            opacity: 1;
            filter: brightness(1.5) drop-shadow(0 0 8px currentColor);
            animation: stringVibrate 0.2s ease-in-out;
        }

        @keyframes stringVibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-0.5px); }
            75% { transform: translateX(0.5px); }
        }

        /* Instructions */
        .instructions {
            display: none;
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translate(10px, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 1.2rem 0.7rem;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.13);
            text-align: left;
            font-size: 0.98rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(191, 161, 74, 0.18);
            z-index: 100;
            max-width: 300px;
            min-width: 240px;
            min-height: 110px;
            margin: 0;
            word-break: break-word;
            white-space: normal;
        }

        /* Info Container */
        .info-container {
            position: absolute;
            left: 40%;
            bottom: -5%;
            transform: translate(-50%, 60%);
            width: 120px;
            height: 100px;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .info-container:hover .instructions {
            display: block;
        }

        .info-icon {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 84px;
            height: 84px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .info-container:hover .info-icon {
            opacity: 1;
        }

        .hint-text {
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-right: 15px;
            font-size: 0.9rem;
            color: #bfa14a;
            font-weight: 600;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }

        .instructions p {
            margin: 0.3rem 0;
            font-size: 0.9rem;
            color: #666;
        }

        /* Info Panel */
        .info-panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 280px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 105, 20, 0.2);
        }

        .info-panel h2 {
            color: #bfa14a;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 400;
        }

        .info-panel p {
            line-height: 1.7;
            color: #666;
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
                gap: 2rem;
                margin-top: 10rem;
            }

            .nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .info-panel {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .container {
                margin-top: 7rem;
            }

            .harp-container {
                width: 350px;
                height: 450px;
            }

            .bubble-btn {
                width: 140px;
                height: 140px;
            }
            .bubble-btn img[alt="Belle Icon"],
            .bubble-btn img[alt="VC Icon"],
            .bubble-btn img[alt="Resume Icon"],
            .bubble-btn img[alt="Writing Icon"] {
                width: 45px !important;
                height: 45px !important;
            }
            .bubble-btn span {
                font-size: 0.9rem !important;
            }

            .bubble-btn[href="bio.html"] {
                left: -55px !important;
            }
            .bubble-btn[href*="notion.so"] {
                right: -35px !important;
            }
            .bubble-btn[href="resume.html"] {
                left: -55px !important;
            }
            .bubble-btn[href*="blogs.html"] {
                right: 0px !important;
            }

            .info-container {
                width: 90px;
                height: 80px;
            }

            .info-icon {
                width: 60px !important;
                height: 60px !important;
            }

            .hint-text {
                font-size: 0.75rem;
                margin-right: 8px;
            }

            .instructions {
                width: 90%;
                padding: 1rem;
                min-width: 180px;
                left: 50%;
                top: 100%;
                transform: translate(-50%, 10px);
            }
        }

        /* Small phones (375px - 480px) */
        @media (max-width: 480px) {
            .header {
                top: 1rem;
                width: 92%;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .container {
                margin-top: 5rem;
                padding: 0.5rem;
            }

            .harp-container {
                width: 280px;
                height: 365px;
                margin-top: 60px; /* room for top bubbles above */
                margin-bottom: 100px; /* room for bottom bubbles below */
            }

            /* Move all bubbles below the harp in a 2x2 grid */
            .bubble-btn {
                width: 80px;
                height: 80px;
            }
            .bubble-btn img[alt="Belle Icon"],
            .bubble-btn img[alt="VC Icon"],
            .bubble-btn img[alt="Resume Icon"],
            .bubble-btn img[alt="Writing Icon"] {
                width: 30px !important;
                height: 30px !important;
            }
            .bubble-btn span {
                font-size: 0.7rem !important;
            }

            /* Row 1: About + Investing, above harp */
            .bubble-btn[href="bio.html"] {
                top: -70px !important;
                bottom: auto !important;
                left: 20px !important;
            }
            .bubble-btn[href*="notion.so"] {
                top: -70px !important;
                bottom: auto !important;
                right: 20px !important;
            }

            /* Row 2: Resume + Writings */
            .bubble-btn[href="resume.html"] {
                bottom: -185px !important;
                left: 50px !important;
            }
            .bubble-btn[href*="blogs.html"] {
                bottom: -185px !important;
                right: 50px !important;
            }

            .info-container {
                width: 70px;
                height: 60px;
            }

            .info-icon {
                width: 45px !important;
                height: 45px !important;
            }

            .hint-text {
                font-size: 0.6rem;
                margin-right: 4px;
            }

            .instructions {
                min-width: 150px;
                font-size: 0.8rem;
            }

            .instructions p {
                font-size: 0.75rem;
            }
        }

        .bubble-btn {
            position: absolute;
            width: 180px;
            height: 180px;
            z-index: 30;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .bubble-btn:hover {
            transform: scale(1.15) translateY(-18px) rotate(-6deg);
        }

        .bubble-flip {
            transform: scaleX(-1);
        }
        .bubble-flip:hover {
            transform: scaleX(-1) scale(1.15) translateY(-18px) rotate(-6deg);
        }
    </style>
</head>

    <script>
        let audioContext = null;

        // Note mappings with proper octave coloring
        const notes = [
            { key: 'q', note: 'C3', freq: 130.81, noteType: 'C' },
            { key: 'w', note: 'D3', freq: 146.83, noteType: 'D' },
            { key: 'e', note: 'E3', freq: 164.81, noteType: 'E' },
            { key: 'r', note: 'F3', freq: 174.61, noteType: 'F' },
            { key: 't', note: 'G3', freq: 196.00, noteType: 'G' },
            { key: 'y', note: 'A3', freq: 220.00, noteType: 'A' },
            { key: 'u', note: 'B3', freq: 246.94, noteType: 'B' },
            { key: 'i', note: 'C4', freq: 261.63, noteType: 'C' },
            { key: 'o', note: 'D4', freq: 293.66, noteType: 'D' },
            { key: 'p', note: 'E4', freq: 329.63, noteType: 'E' },
            { key: 'a', note: 'F4', freq: 349.23, noteType: 'F' },
            { key: 's', note: 'G4', freq: 392.00, noteType: 'G' },
            { key: 'd', note: 'A4', freq: 440.00, noteType: 'A' },
            { key: 'f', note: 'B4', freq: 493.88, noteType: 'B' },
            { key: 'g', note: 'C5', freq: 523.25, noteType: 'C' },
            { key: 'h', note: 'D5', freq: 587.33, noteType: 'D' },
            { key: 'j', note: 'E5', freq: 659.25, noteType: 'E' },
            { key: 'k', note: 'F5', freq: 698.46, noteType: 'F' },
            { key: 'l', note: 'G5', freq: 783.99, noteType: 'G' }
        ];

        // Color mapping for strings
        function getStringColor(noteType) {
            switch(noteType) {
                case 'C': return '#DC143C'; // Red
                case 'F': return '#000000'; // Black
                default: return '#DAA520'; // Gold
            }
        }

        // Initialize audio
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Create strings positioned over the harp image
        function createStrings() {
            const stringsGroup = document.getElementById('harpStrings');
            stringsGroup.innerHTML = ""; // Clear previous strings

            // Manually define positions for each string (14 total for 2 octaves)
            // Adjust these values as needed for perfect fit!
            const stringPositions = [
                // Example values, adjust as needed:
                { topX: 170, topY: 100, bottomX: 180, bottomY: 500 }, // C3
                { topX: 185, topY: 112, bottomX: 195, bottomY: 495 }, // D3
                { topX: 200, topY: 125, bottomX: 210, bottomY: 460 }, // E3
                { topX: 215, topY: 128, bottomX: 225, bottomY: 455 }, // F3
                { topX: 230, topY: 132, bottomX: 240, bottomY: 450 }, // G3
                { topX: 245, topY: 137, bottomX: 255, bottomY: 445 }, // A3
                { topX: 260, topY: 143, bottomX: 270, bottomY: 440 }, // B3
                { topX: 275, topY: 156, bottomX: 285, bottomY: 414 }, // C4
                { topX: 290, topY: 174, bottomX: 300, bottomY: 364 }, // D4
                { topX: 305, topY: 183, bottomX: 315, bottomY: 354 }, // E4
                { topX: 320, topY: 200, bottomX: 330, bottomY: 320 }, // F4
                { topX: 335, topY: 188, bottomX: 345, bottomY: 320 }, // G4
                { topX: 350, topY: 200, bottomX: 360, bottomY: 300 }, // A4
                { topX: 365, topY: 190, bottomX: 375, bottomY: 240}, // B4
            ];

            const displayNotes = notes.slice(0, 14); // C3 to B4

            for (let i = 0; i < stringPositions.length; i++) {
                const pos = stringPositions[i];
                const note = displayNotes[i];

                const string = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                string.setAttribute('x1', pos.topX);
                string.setAttribute('y1', pos.topY);
                string.setAttribute('x2', pos.bottomX);
                string.setAttribute('y2', pos.bottomY);
                string.setAttribute('class', 'harp-string');
                string.setAttribute('stroke', getStringColor(note.noteType));
                string.setAttribute('data-note', note.note);
                string.setAttribute('data-freq', note.freq);
                string.setAttribute('data-key', note.key);
                string.addEventListener('click', () => playNote(note.freq, note.note, string));

                stringsGroup.appendChild(string);
            }
        }

        // Play note
        function playNote(freq, noteName, stringEl) {
            initAudio();
            
            const now = audioContext.currentTime;
            
            // Create oscillators for rich harp sound
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const osc3 = audioContext.createOscillator();
            
            const gainNode = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            // Configure oscillators
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(freq, now);
            
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 2, now);
            
            osc3.type = 'sine';
            osc3.frequency.setValueAtTime(freq * 3, now);
            
            // Configure filter
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(freq * 4, now);
            filter.Q.setValueAtTime(2, now);
            
            // Connect audio nodes
            osc1.connect(filter);
            osc2.connect(filter);
            osc3.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // Envelope
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.4, now + 0.005);
            gainNode.gain.exponentialRampToValueAtTime(0.15, now + 0.3);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 2.5);
            
            // Start and stop
            osc1.start(now);
            osc2.start(now);
            osc3.start(now);
            osc1.stop(now + 2.5);
            osc2.stop(now + 2.5);
            osc3.stop(now + 2.5);
            
            // Visual feedback
            if (stringEl) {
                stringEl.classList.add('active');
                setTimeout(() => stringEl.classList.remove('active'), 200);
            }
            
            // Show note
            const display = document.getElementById('noteDisplay');
            display.textContent = noteName;
            display.classList.add('active');
            clearTimeout(window.noteTimeout);
            window.noteTimeout = setTimeout(() => {
                display.classList.remove('active');
            }, 1200);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const noteData = notes.find(n => n.key === key);
            
            if (noteData && !e.repeat) {
                const string = document.querySelector(`[data-key="${key}"]`);
                if (string) {
                    playNote(noteData.freq, noteData.note, string);
                }
            }
        });

        // Monkey meme sequence detection
        let keySequence = [];
        const firstOctaveKeys = ['q','w','e','r','t','y','u','i'];
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (firstOctaveKeys.includes(key)) {
                keySequence.push(key);
                if (keySequence.length > 8) keySequence.shift();
                if (keySequence.join('') === firstOctaveKeys.join('')) {
                    document.getElementById('monkeyModal').style.display = 'flex';
                    keySequence = [];
                }
            } else {
                keySequence = [];
            }
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            createStrings();
        });
    </script>
